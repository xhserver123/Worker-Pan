name: Build and Obfuscate Worker

on:
  workflow_dispatch:  # 仅手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Get version
        id: get_version
        run: echo "version=$(jq -r .version package.json)" >> $GITHUB_OUTPUT

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "latest"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Build project
        run: npm run build

      # 代码混淆步骤
      - name: Obfuscate code
        run: |
          npx javascript-obfuscator dist --output dist-obfuscated --compact true --self-defending false

      # 打包混淆后的代码
      - name: Package obfuscated code
        run: tar -czf obfuscated-worker.tar.gz -C dist-obfuscated .

      # 上传产物
      - name: Upload obfuscated artifact
        uses: actions/upload-artifact@v4
        with:
          name: obfuscated-worker-${{ steps.get_version.outputs.version || 'unknown' }}
          path: obfuscated-worker.tar.gz
          retention-days: 7